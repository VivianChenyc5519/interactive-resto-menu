<html>
    <head>
        <title>Wan - Salad </title>
        <link rel="stylesheet" href="styles.css">
        <script>
            function plus(){
                let val= Number(document.getElementById('quantity').value);
                document.getElementById('quantity').value= val + 1
            }
            function minus(){
                let val= Number(document.getElementById('quantity').value);
                if (val>1){
                    document.getElementById('quantity').value= val - 1
                }
            }
        </script>
    </head>
    <body style="display: flex; flex-direction: column;">
    
        <div id="top-bar"> 
                <div style="display: flex;">
                    <button class="icon-btn">
                        <img src="ressource/return-button.png" height="75%" alt="Menu">
                    </button>
                    <a class="icon-btn" href="index-french.html">
                        <img src="ressource/home.png" height="75%" alt="Menu">
                    </a>
                </div>
                    <a href="user_page.html">
                    <button class="icon-btn">
                        Bienvenue, XXX 
                    <img src="ressource/profile.png" height="75%" alt="Menu">
                    </button>
                    </a>
                </div>
            </div>

            <div style="display: flex; justify-content: center; align-items: center; padding:10px">
                <div style="display: flex; flex-direction: column; align-items: center;" >
                    <div id="item-large-img">
                        <img src="ressource/salad.webp" style="width: 100%;">
                    </div>
                    <p><strong>Salade</strong></p>
                </div>

                <div style="margin:50px">
                    <p><strong>Ingrédients:</strong></p>
                    <p id="ingredients">Épinards, Laitue</p>
                    <p><strong>Allergènes:</strong></p>
                    <p id="allergens">Blé, Fruits à coque</p>
                    <p><strong>Empreinte Carbone:</strong></p>
                    <p id="carbon-footprint">0.44g</p>
                <form id="add-to-cart">
                    <div style="display: flex;">
                    <button type="button" onclick="minus()">-</button>
                    <input type="number" readonly id="quantity" value=1 style="width: 50px; height: 30px;">
                    <button type="button" onclick="plus()">+</button>
                    </div>
                    
                    <input type="submit" value="Add" style="width: 100px; background-color: #747272;margin: 10px;">
                </form>
                </div>
                
                
            </div>
            <a href="salad.html" style="justify-self:flex-end">
            <button class="icon-btn">
                <img src="ressource/french.png" style="filter: drop-shadow(0px 11px 11px #7a7979 );"  height="75%" alt="Menu">
            </button>
            </a>
    </body>
</html>
